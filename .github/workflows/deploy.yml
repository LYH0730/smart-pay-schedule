# 1. Node.js 설정 시 캐시 활성화
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm' # 캐시 활성화!

      # 2. 빌드 (동일)
      - name: Install Dependencies
        run: npm ci
      
      - name: Prisma Generate
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy"
          NEXT_PUBLIC_SUPABASE_URL: "http://dummy"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"

      # 3. 전송 시 'node_modules' 제외 및 압축 전송
      - name: Copy files to Linux Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          # node_modules는 서버에서 따로 설치하므로 전송 제외
          source: ".next,public,package.json,package-lock.json,prisma,next.config.js"
          target: "~/projects/smart-pay-schedule"
          strip_components: 0 # 경로 유지

      # 4. 리눅스 서버 작업 최적화
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            cd ~/projects/smart-pay-schedule
            # 패키지가 변경되었을 때만 설치하도록 최적화 가능하지만,
            # 일단은 안정성을 위해 유지하되 --prefer-offline 추가
            npm ci --production --prefer-offline
            npx prisma generate
            pm2 restart all