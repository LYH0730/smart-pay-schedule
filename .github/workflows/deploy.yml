name: Deploy to Home Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4로 업데이트 권장

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy"
          NEXT_PUBLIC_SUPABASE_URL: "http://dummy"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"

      # standalone 빌드 결과물 구성을 위한 사전 작업 (서버 부하 경감)
      - name: Prepare Standalone Artifacts
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          cp -r prisma .next/standalone/

      # 압축하여 전송 (개별 파일 전송보다 훨씬 빠르고 안정적임)
      - name: Compress and Copy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          source: ".next/standalone/*"
          target: "~/projects/smart-pay-schedule"
          strip_components: 2

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            cd ~/projects/smart-pay-schedule
            
            # 런타임에 필요한 최소한의 환경변수 설정 (.env 파일이 서버에 있다면 생략 가능)
            # 서버 사양(G530)을 고려하여 prisma generate는 필요한 경우만 수행
            npx prisma generate
            
            # PM2 프로세스가 없으면 시작, 있으면 재시작 (zero-downtime 지향)
            pm2 delete smart-pay || true
            PORT=3000 pm2 start server.js --name "smart-pay"
            
            pm2 save
            pm2 flush